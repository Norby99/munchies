<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Munchies Docs</title>

    <!-- Bootstrap CSS (CDN, no installation needed) -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    />

    <!-- Bootstrap Icons (CDN, no installation needed) -->
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <style>
        :root {
          --bg-start: #0f172a;
          --bg-end: #1e293b;
          --card-bg: rgba(255, 255, 255, 0.08);
          --card-border: rgba(255, 255, 255, 0.15);
        }

        body {
          min-height: 100vh;
          background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
          color: #e2e8f0;
          display: grid;
          place-items: center;
          margin: 0;
          padding: 1.5rem;
        }

        .docs-card {
          width: 100%;
          max-width: 760px;
          background: var(--card-bg);
          border: 1px solid var(--card-border);
          backdrop-filter: blur(8px);
          border-radius: 1rem;
          box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        .docs-list a {
          text-decoration: none;
          color: #f8fafc;
          font-weight: 500;
        }

        .docs-list a:hover {
          color: #93c5fd;
        }

        .badge-soft {
          background: rgba(147, 197, 253, 0.2);
          color: #bfdbfe;
          border: 1px solid rgba(147, 197, 253, 0.4);
        }
    </style>
</head>
<body>
<main class="docs-card p-4 p-md-5">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
        <div>
            <h1 class="h2 mb-1">Munchies Documentation</h1>
            <p class="text-light-emphasis mb-0">
                Quick access to project resources and generated docs.
            </p>
        </div>
    </div>

    <ul class="list-group list-group-flush docs-list">
        <li class="list-group-item bg-transparent border-secondary-subtle py-3">
            <a href="https://github.com/Norby99/munchies" target="_blank" rel="noopener noreferrer">
                <i class="bi bi-github me-2"></i>Repository
            </a>
        </li>
        <li class="list-group-item bg-transparent border-secondary-subtle py-3">
            <a href="https://norby99.github.io/munchies/kotlin/index.html" target="_blank" rel="noopener noreferrer">
                <i class="bi bi-journal-code me-2"></i>Kotlin Docs
            </a>
        </li>
        <li class="list-group-item bg-transparent border-secondary-subtle py-3">
            <a href="https://norby99.github.io/munchies/openapi/index.html" target="_blank" rel="noopener noreferrer">
                <i class="bi bi-file-earmark-text me-2"></i>OpenAPI Docs
            </a>
        </li>
        <li class="list-group-item bg-transparent border-secondary-subtle py-3">
            <a href="https://norby99.github.io/munchies/typescript/index.html" target="_blank" rel="noopener noreferrer">
                <i class="bi bi-filetype-tsx me-2"></i>Typescript Docs
            </a>
        </li>
    </ul>
</main>
</body>
</html>
