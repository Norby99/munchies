[versions]
kotlin = "1.9.25"
micronaut = "4.6.2"
jakarta-validation = "3.0.2"
ksp = "1.9.25-1.0.20"
shadow = "8.3.9"
spotless = "6.25.0"

[plugins]
kotlin-multiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
allopen = { id= "org.jetbrains.kotlin.plugin.allopen", version.ref = "kotlin" }
ksp = { id = "com.google.devtools.ksp", version.ref = "ksp" }
shadow = { id = "com.gradleup.shadow", version.ref = "shadow" }
micronaut-application = { id = "io.micronaut.application", version.ref = "micronaut" }
micronaut-aot = { id = "io.micronaut.aot", version.ref = "micronaut" }
spotless = { id = "com.diffplug.spotless", version.ref = "spotless" }

[libraries]
jakarta-validation-api = { module = "jakarta.validation:jakarta.validation-api", version.ref = "jakarta-validation" }

