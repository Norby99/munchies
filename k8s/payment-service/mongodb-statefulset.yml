apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: payment-mongodb
  namespace: payment-service
spec:
  serviceName: payment-mongodb
  replicas: 1
  selector:
    matchLabels:
      app: payment-mongodb
  template:
    metadata:
      labels:
        app: payment-mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_DATABASE
              value: payment-service
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command: ["mongosh", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          volumeMounts:
            - name: payment-mongo-data
              mountPath: /data/db
      volumes:
        - name: payment-mongo-data
          persistentVolumeClaim:
            claimName: payment-mongo-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: payment-mongodb
  namespace: payment-service
spec:
  selector:
    app: payment-mongodb
  ports:
    - port: 27017
      targetPort: 27017
