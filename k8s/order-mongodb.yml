apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-mongodb
  labels:
    app: order-mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-mongodb
  template:
    metadata:
      labels:
        app: order-mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:4.4
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_DATABASE
          value: order-service
        volumeMounts:
        - name: order-mongo-data
          mountPath: /data/db
      volumes:
      - name: order-mongo-data
        persistentVolumeClaim:
          claimName: order-mongo-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: order-mongo-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: order-mongodb
spec:
  selector:
    app: order-mongodb
  ports:
  - port: 27017
    targetPort: 27017
