micronaut:
  application:
    name: user-service
  openapi:
    enabled: true
  http:
    services:
      payment-service:
        url: ${PAYMENT_SERVICE_URL:http://localhost:8083}
      gateway-service:
        url: ${GATEWAY_SERVICE_URL:http://localhost:8086}
mongodb:
  uri: mongodb://localhost:27017/user-service

endpoints:
  health:
    enabled: true
    sensitive: false

kafka:
  bootstrap:
    servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    org.apache.kafka: WARN