version: "3.9"
services:
  order-service:
    container_name: munchies-order-service
    build:
      context: ../../order-service/build/docker/main
    image: munchies-order-service:latest
    ports: ["8081:8080"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=munchies-kafka:9092
      - MONGODB_URI=mongodb://munchies-mongo-order-service:27017/order-service
  user-service:
    container_name: munchies-user-service
    build:
      context: ../../user-service/service/build/docker/main
    image: munchies-user-service:latest
    ports: ["8082:8080"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=munchies-kafka:9092
      - MONGODB_URI=mongodb://munchies-mongo-user-service:27017/user-service
  payment-service:
    container_name: munchies-payment-service
    build:
      context: ../../payment-service/service/build/docker/main
    image: munchies-payment-service:latest
    ports: ["8083:8080"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=munchies-kafka:9092
      - MONGODB_URI=mongodb://munchies-mongo-payment-service:27017/payment-service
