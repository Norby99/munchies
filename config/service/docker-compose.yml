version: "3.9"
services:
  order-service:
    container_name: munchies-order-service
    build:
      context: ../../order-service/build/docker/main
    image: munchies-order-service:latest
    ports: ["8081:8080"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=host.docker.internal:9092
  user-service:
    container_name: munchies-user-service
    build:
      context: ../../user-service/service/build/docker/main
    image: munchies-user-service:latest
    ports: ["8082:8080"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=host.docker.internal:9092
      - MONGODB_URI=mongodb://host.docker.internal:27017/user-service
